# HTTP Server (temporário - configurar SSL depois)
server {
    # Aceita food.eliseus.com.br E todos os subdomínios (*.eliseus.com.br)
    server_name food.eliseus.com.br *.eliseus.com.br yumgo.com.br *.yumgo.com.br;
    root /var/www/restaurante/public;

    index index.php index.html;
    charset utf-8;

    # Client max body size for uploads
    client_max_body_size 20M;

    # Laravel Reverb WebSocket (porta 8081)
    location /app {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # 📦 CACHE DE IMAGENS (30 dias) - Storage/Tenancy/Logos
    location ~* ^/(storage|tenancy|images|logos)/.+\.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Cache-Status "HIT-IMAGE" always;
        add_header Pragma "public" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;

        # Permitir acesso CORS para imagens
        add_header Access-Control-Allow-Origin "*" always;

        # ETag para validação
        etag on;
    }

    # 📄 CACHE DE ASSETS ESTÁTICOS (7 dias)
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header X-Cache-Status "HIT-STATIC" always;
        access_log off;
        etag on;
    }

    # 🖼️ CACHE DE ÍCONES/FAVICONS (90 dias)
    location ~* \.(ico)$ {
        expires 90d;
        add_header Cache-Control "public, max-age=7776000, immutable" always;
        access_log off;
    }

    # 📱 CACHE DO SERVICE WORKER E MANIFEST (1 hora - precisa atualizar rápido)
    location ~* ^/(sw\.js|manifest\.json)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        add_header Service-Worker-Allowed "/";
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/food.eliseus.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/food.eliseus.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name food.eliseus.com.br *.eliseus.com.br yumgo.com.br *.yumgo.com.br;

    # Redireciona TODOS os acessos HTTP para HTTPS
    return 301 https://$host$request_uri;
}
