# ========== HEADERS DE SEGURANÇA - YUMGO.COM.BR ==========
# Adicionar dentro do bloco server {} da configuração Nginx
# Arquivo: /etc/nginx/sites-available/yumgo.com.br
# Data: 09/03/2026

# Prevenir clickjacking (ataques de iframe malicioso)
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevenir MIME sniffing (navegador tentando adivinhar tipo de arquivo)
add_header X-Content-Type-Options "nosniff" always;

# XSS Protection (legacy - mantido para navegadores antigos)
add_header X-XSS-Protection "1; mode=block" always;

# Content Security Policy (CSP) - Principal proteção contra XSS
# Permite: próprio domínio, Tailwind CDN, Pagar.me SDK, Google Fonts
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://assets.pagar.me https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.pagar.me https://api.pagar.me/core/v5; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

# Referrer Policy (controla informações enviadas no header Referer)
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy (controla acesso a APIs do navegador)
add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(), payment=(self), usb=()" always;

# HSTS - Força HTTPS por 1 ano
# ⚠️ SÓ ATIVAR SE HTTPS ESTIVER 100% FUNCIONAL!
# ⚠️ Comente esta linha se tiver dúvidas:
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Remove header Server (oculta versão do Nginx)
server_tokens off;

# ========== FIM HEADERS DE SEGURANÇA ==========
