server {
    listen 80;
    listen [::]:80;
    server_name bot.yumgo.com.br;

    # Logs
    access_log /var/log/nginx/bot.yumgo.com.br.access.log;
    error_log /var/log/nginx/bot.yumgo.com.br.error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy para N8N
    location / {
        proxy_pass http://localhost:5678;
        proxy_http_version 1.1;

        # WebSocket support (importante para n8n)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Webhook endpoint (sem autenticação para Flare chamar)
    location /webhook/ {
        proxy_pass http://localhost:5678/webhook/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Permitir requisições grandes (stack traces)
        client_max_body_size 10M;
    }

    # Health check
    location /healthz {
        proxy_pass http://localhost:5678/healthz;
        access_log off;
    }
}
