name: Build Electron App

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'electron-bridge/**'
  pull_request:
    paths:
      - 'electron-bridge/**'
  release:
    types: [created]
  workflow_dispatch: # Permite execução manual

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: 'windows'
            build_command: 'build:win'
          - os: macos-latest
            artifact_name: 'macos'
            build_command: 'build:mac'
          - os: ubuntu-latest
            artifact_name: 'linux'
            build_command: 'build:linux'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-bridge/package-lock.json

      - name: Install dependencies
        working-directory: electron-bridge
        run: npm ci

      - name: Build Electron app
        working-directory: electron-bridge
        run: npm run ${{ matrix.build_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist directory
        working-directory: electron-bridge
        run: ls -lah dist/

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: yumgo-bridge-windows
          path: |
            electron-bridge/dist/*.exe
          retention-days: 30

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: yumgo-bridge-macos
          path: |
            electron-bridge/dist/*.dmg
            electron-bridge/dist/*.zip
          retention-days: 30

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: yumgo-bridge-linux
          path: |
            electron-bridge/dist/*.AppImage
            electron-bridge/dist/*.deb
          retention-days: 30

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            electron-bridge/dist/*.exe
            electron-bridge/dist/*.dmg
            electron-bridge/dist/*.zip
            electron-bridge/dist/*.AppImage
            electron-bridge/dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify build completion
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Build status
        run: |
          echo "Build completed!"
          echo "Windows: ${{ needs.build.result }}"
          echo "Download artifacts from Actions tab"
