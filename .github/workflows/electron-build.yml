name: Build YumGo Bridge

on:
  push:
    branches:
      - master
    paths:
      - 'electron-bridge/**'
      - '.github/workflows/electron-build.yml'
  workflow_dispatch: # Permite execução manual

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-bridge/package-lock.json

      - name: Install dependencies
        working-directory: electron-bridge
        run: npm install --force

      - name: Get version
        id: version
        working-directory: electron-bridge
        shell: bash
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Electron app
        working-directory: electron-bridge
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        working-directory: electron-bridge
        shell: bash
        run: ls -lah dist/ || dir dist\

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: YumGo-Bridge-v${{ steps.version.outputs.VERSION }}-Windows
          path: |
            electron-bridge/dist/*.exe
          retention-days: 90

      - name: Create Release (se for push para master)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: bridge-v${{ steps.version.outputs.VERSION }}
          name: YumGo Bridge v${{ steps.version.outputs.VERSION }}
          body: |
            ## 🖨️ YumGo Bridge v${{ steps.version.outputs.VERSION }}

            ### 📥 Download

            **Windows 10/11 (64-bit):**
            - YumGo-Bridge-${{ steps.version.outputs.VERSION }}-win-x64.exe (~150 MB)

            ### ✨ Novidades desta versão

            - 🚀 **Autostart:** Inicia automaticamente com o Windows
            - 💾 **Persistência:** Configurações salvas permanentemente
            - 🐛 **Fix Tray:** Status do ícone na bandeja corrigido
            - 📝 **Melhorias:** Interface mais responsiva

            ### 📋 Changelog Completo

            Veja [CHANGELOG-v${{ steps.version.outputs.VERSION }}.md](https://github.com/orfeubr/yumgo/blob/master/electron-bridge/CHANGELOG-v2.2.0.md)

            ### 📖 Documentação

            - [Guia de Instalação](https://github.com/orfeubr/yumgo/blob/master/electron-bridge/README.md)
            - [Troubleshooting](https://github.com/orfeubr/yumgo/blob/master/DEBUG-WEBSOCKET-BRIDGE.md)

            ---

            **Build:** ${{ github.sha }}
            **Data:** ${{ github.event.head_commit.timestamp }}
          files: |
            electron-bridge/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notificar resultado
    runs-on: ubuntu-latest
    needs: build-windows
    if: always()

    steps:
      - name: Build Status
        run: |
          echo "✅ Build do YumGo Bridge concluído!"
          echo "Status: ${{ needs.build-windows.result }}"
          echo ""
          echo "📥 Download: GitHub > Actions > Artifacts"
          echo "📦 Release: GitHub > Releases (se criada)"
