<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo circular roxo -->
  <circle cx="256" cy="256" r="240" fill="#667eea"/>

  <!-- Impressora (ícone simples) -->
  <g transform="translate(106, 136)">
    <!-- Corpo da impressora -->
    <rect x="50" y="80" width="200" height="120" rx="10" fill="white"/>
    <rect x="50" y="80" width="200" height="40" rx="10" fill="#e0e0e0"/>

    <!-- Papel saindo -->
    <rect x="80" y="160" width="140" height="100" rx="5" fill="#f5f5f5" stroke="#666" stroke-width="2"/>

    <!-- Linhas no papel -->
    <line x1="100" y1="180" x2="200" y2="180" stroke="#999" stroke-width="2"/>
    <line x1="100" y1="200" x2="200" y2="200" stroke="#999" stroke-width="2"/>
    <line x1="100" y1="220" x2="180" y2="220" stroke="#999" stroke-width="2"/>

    <!-- LED indicador -->
    <circle cx="240" cy="100" r="8" fill="#10b981"/>
  </g>

  <!-- Texto YumGo (opcional) -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
    YumGo
  </text>
</svg>
