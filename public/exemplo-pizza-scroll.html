<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de Pizza Meio a Meio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, #ff6b35 0%, #e85a25 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .step-title {
            font-size: 18px;
            font-weight: 600;
            padding: 16px 20px;
            background: #f9f9f9;
            border-bottom: 2px solid #e0e0e0;
        }

        /* SCROLL DE SABORES */
        .flavors-scroll {
            max-height: 400px;
            overflow-y: auto;
            padding: 12px;
        }

        .flavors-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .flavors-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .flavors-scroll::-webkit-scrollbar-thumb {
            background: #ff6b35;
            border-radius: 3px;
        }

        /* CARD DE SABOR */
        .flavor-card {
            display: flex;
            gap: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .flavor-card:hover {
            border-color: #ff6b35;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.15);
            transform: translateY(-2px);
        }

        .flavor-card.selected {
            border-color: #ff6b35;
            background: #fff5f2;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .flavor-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .flavor-info {
            flex: 1;
            min-width: 0;
        }

        .flavor-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        /* INGREDIENTES EM DESTAQUE */
        .flavor-ingredients {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .flavor-ingredients strong {
            color: #ff6b35;
            font-weight: 600;
        }

        .flavor-price {
            font-size: 18px;
            font-weight: 700;
            color: #ff6b35;
        }

        .selected-badge {
            display: inline-block;
            background: #ff6b35;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        /* RESUMO DA SELEÇÃO */
        .selection-summary {
            padding: 20px;
            background: #f9f9f9;
            border-top: 2px solid #e0e0e0;
        }

        .selected-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .selected-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .selected-details h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }

        .selected-details p {
            font-size: 12px;
            color: #666;
        }

        /* BOTÃO FINALIZAR */
        .btn-checkout {
            width: 100%;
            padding: 16px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }

        .btn-checkout:hover:not(:disabled) {
            background: #e85a25;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-checkout:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .success-message {
            background: #efe;
            color: #060;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .search-box {
            padding: 12px;
            background: #f9f9f9;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #ff6b35;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍕 Pizza Meio a Meio</h1>
            <p>Escolha 2 sabores deliciosos</p>
        </div>

        <!-- PASSO 1: Primeiro Sabor -->
        <div id="step1">
            <div class="step-title">1️⃣ Escolha o primeiro sabor</div>

            <div class="search-box">
                <input
                    type="text"
                    id="search1"
                    placeholder="🔍 Buscar por sabor ou ingrediente..."
                    oninput="searchFlavors(this.value, 'first')"
                >
            </div>

            <div class="flavors-scroll" id="flavors-first">
                <!-- Cards serão inseridos aqui via JS -->
            </div>
        </div>

        <!-- PASSO 2: Segundo Sabor (aparece após selecionar primeiro) -->
        <div id="step2" style="display: none;">
            <div class="step-title">2️⃣ Escolha o segundo sabor</div>

            <div class="search-box">
                <input
                    type="text"
                    id="search2"
                    placeholder="🔍 Buscar por sabor ou ingrediente..."
                    oninput="searchFlavors(this.value, 'second')"
                >
            </div>

            <div class="flavors-scroll" id="flavors-second">
                <!-- Cards serão inseridos aqui via JS -->
            </div>
        </div>

        <!-- RESUMO E CHECKOUT -->
        <div class="selection-summary">
            <div id="error-msg" class="error-message" style="display: none;"></div>
            <div id="success-msg" class="success-message" style="display: none;"></div>

            <div id="selected-first" style="display: none;">
                <!-- Resumo do primeiro sabor -->
            </div>

            <div id="selected-second" style="display: none;">
                <!-- Resumo do segundo sabor -->
            </div>

            <div id="price-info" style="display: none; margin-top: 12px; font-size: 14px; color: #666;">
                <p>💡 <strong>Preço:</strong> Cobramos pelo sabor mais caro</p>
            </div>

            <button
                id="btn-checkout"
                class="btn-checkout"
                disabled
                onclick="finalizarPedido()"
            >
                🛒 Finalizar Pedido
            </button>
        </div>
    </div>

    <script>
        // DADOS DE EXEMPLO (virão da API)
        let allFlavors = [];
        let firstFlavor = null;
        let secondFlavor = null;
        let loading = false;

        // CARREGAR SABORES DA API
        async function loadFlavors() {
            try {
                const response = await fetch('/api/v1/products/pizza/flavors?per_page=50');
                const data = await response.json();
                allFlavors = data.data;
                renderFlavors(allFlavors, 'first');
            } catch (error) {
                console.error('Erro ao carregar sabores:', error);
                showError('Erro ao carregar sabores. Tente novamente.');
            }
        }

        // RENDERIZAR CARDS DE SABORES
        function renderFlavors(flavors, step) {
            const container = document.getElementById(`flavors-${step}`);

            if (flavors.length === 0) {
                container.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">Nenhum sabor encontrado</p>';
                return;
            }

            container.innerHTML = flavors.map(flavor => `
                <div class="flavor-card ${isSelected(flavor.id, step) ? 'selected' : ''}"
                     onclick="selectFlavor(${flavor.id}, '${step}')">

                    ${isSelected(flavor.id, step) ? '<span class="selected-badge">✓ Selecionado</span>' : ''}

                    <img
                        src="${flavor.image || 'https://via.placeholder.com/80?text=Pizza'}"
                        alt="${flavor.name}"
                        class="flavor-image"
                    >

                    <div class="flavor-info">
                        <div class="flavor-name">${flavor.name}</div>

                        <!-- INGREDIENTES EM DESTAQUE -->
                        <div class="flavor-ingredients">
                            <strong>🍕 Ingredientes:</strong> ${flavor.ingredients || flavor.ingredients_short || 'Não informado'}
                        </div>

                        <div class="flavor-price">${flavor.price_formatted || 'R$ ' + parseFloat(flavor.price).toFixed(2).replace('.', ',')}</div>
                    </div>
                </div>
            `).join('');
        }

        // VERIFICAR SE ESTÁ SELECIONADO
        function isSelected(flavorId, step) {
            if (step === 'first') return firstFlavor?.id === flavorId;
            if (step === 'second') return secondFlavor?.id === flavorId;
            return false;
        }

        // SELECIONAR SABOR
        function selectFlavor(flavorId, step) {
            const flavor = allFlavors.find(f => f.id === flavorId);

            if (step === 'first') {
                firstFlavor = flavor;
                renderFlavors(allFlavors, 'first');
                showSelectedSummary('first');

                // Mostrar passo 2
                document.getElementById('step2').style.display = 'block';
                renderFlavors(allFlavors, 'second');

                // Scroll suave para passo 2
                setTimeout(() => {
                    document.getElementById('step2').scrollIntoView({ behavior: 'smooth' });
                }, 100);
            } else {
                secondFlavor = flavor;
                renderFlavors(allFlavors, 'second');
                showSelectedSummary('second');
            }

            updateCheckoutButton();
        }

        // MOSTRAR RESUMO DA SELEÇÃO
        function showSelectedSummary(step) {
            const flavor = step === 'first' ? firstFlavor : secondFlavor;
            const container = document.getElementById(`selected-${step}`);

            container.style.display = 'block';
            container.innerHTML = `
                <div class="selected-item">
                    <img src="${flavor.image || 'https://via.placeholder.com/60?text=Pizza'}" alt="${flavor.name}">
                    <div class="selected-details">
                        <h4>${step === 'first' ? '1ª Metade' : '2ª Metade'}: ${flavor.name}</h4>
                        <p><strong>Ingredientes:</strong> ${flavor.ingredients || flavor.ingredients_short}</p>
                        <p style="color: #ff6b35; font-weight: 600; margin-top: 4px;">${flavor.price_formatted}</p>
                    </div>
                </div>
            `;

            if (firstFlavor && secondFlavor) {
                document.getElementById('price-info').style.display = 'block';
            }
        }

        // BUSCAR SABORES
        function searchFlavors(query, step) {
            if (!query.trim()) {
                renderFlavors(allFlavors, step);
                return;
            }

            const filtered = allFlavors.filter(f =>
                f.name.toLowerCase().includes(query.toLowerCase()) ||
                (f.ingredients && f.ingredients.toLowerCase().includes(query.toLowerCase()))
            );

            renderFlavors(filtered, step);
        }

        // ATUALIZAR BOTÃO DE CHECKOUT
        function updateCheckoutButton() {
            const btn = document.getElementById('btn-checkout');

            if (firstFlavor && secondFlavor) {
                btn.disabled = false;
                const maxPrice = Math.max(firstFlavor.price, secondFlavor.price);
                btn.textContent = `🛒 Finalizar Pedido - R$ ${maxPrice.toFixed(2).replace('.', ',')}`;
            } else {
                btn.disabled = true;
                btn.textContent = '🛒 Selecione 2 sabores';
            }
        }

        // FINALIZAR PEDIDO
        async function finalizarPedido() {
            if (!firstFlavor || !secondFlavor) {
                showError('Selecione os 2 sabores!');
                return;
            }

            if (loading) return;

            const btn = document.getElementById('btn-checkout');
            const originalText = btn.textContent;

            loading = true;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Processando...';

            hideMessages();

            try {
                // TOKEN DE AUTENTICAÇÃO (ajustar conforme seu sistema)
                const token = localStorage.getItem('auth_token');

                if (!token) {
                    throw new Error('Você precisa fazer login primeiro!');
                }

                // PREPARAR DADOS DO PEDIDO
                const payload = {
                    items: [
                        {
                            product_id: firstFlavor.id,
                            quantity: 1,
                            variation_id: null, // Adicionar se tiver tamanhos
                            half_and_half: {
                                product_id: secondFlavor.id,
                                variation_id: null,
                            },
                            notes: `Meio a Meio: ${firstFlavor.name} + ${secondFlavor.name}`,
                        }
                    ],
                    delivery_address: 'Rua Teste, 123', // TROCAR por formulário real
                    payment_method: 'pix', // TROCAR por seleção do usuário
                    use_cashback: 0,
                };

                console.log('Enviando pedido:', payload);

                // FAZER REQUEST
                const response = await fetch('/api/v1/orders', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Erro ao criar pedido');
                }

                // SUCESSO!
                console.log('Pedido criado:', data);
                showSuccess(`✅ Pedido #${data.order.order_number} criado com sucesso!`);

                // Se for PIX, mostrar QR Code
                if (data.payment?.qrcode_image) {
                    setTimeout(() => {
                        window.location.href = `/pix-payment?order=${data.order.id}`;
                    }, 2000);
                } else {
                    setTimeout(() => {
                        window.location.href = `/order-success?order=${data.order.id}`;
                    }, 2000);
                }

            } catch (error) {
                console.error('Erro ao finalizar pedido:', error);
                showError(error.message);
                btn.disabled = false;
                btn.textContent = originalText;
            } finally {
                loading = false;
            }
        }

        // MENSAGENS
        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'none';
        }

        // INICIALIZAR
        loadFlavors();
    </script>
</body>
</html>
