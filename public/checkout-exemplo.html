<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pedido - YumGo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .checkout-page {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .page-header {
            background: linear-gradient(135deg, #ff6b35 0%, #e85a25 100%);
            color: white;
            padding: 24px;
        }

        .page-header h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .section {
            padding: 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff6b35;
        }

        .payment-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .payment-option {
            position: relative;
        }

        .payment-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .payment-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .payment-option input:checked + label {
            border-color: #ff6b35;
            background: #fff5f2;
        }

        #card-fields {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .card-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .cart-summary {
            background: #f9f9f9;
        }

        #cart-items {
            margin-bottom: 16px;
        }

        .totals {
            padding-top: 16px;
            border-top: 2px solid #e0e0e0;
        }

        .total-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .total-line.grand-total {
            font-size: 20px;
            font-weight: 700;
            color: #ff6b35;
            padding-top: 12px;
            border-top: 2px solid #e0e0e0;
        }

        #btn-finalizar-pedido {
            width: 100%;
            padding: 18px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        #btn-finalizar-pedido:hover:not(:disabled) {
            background: #e85a25;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        #btn-finalizar-pedido:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkout-page">
            <div class="page-header">
                <h1>🛒 Finalizar Pedido</h1>
                <p>Revise seu pedido e escolha a forma de pagamento</p>
            </div>

            <!-- CARRINHO -->
            <div class="section cart-summary">
                <h2>Itens do Pedido</h2>
                <div id="cart-items">
                    <!-- Preenchido via JS -->
                </div>

                <div class="totals">
                    <div class="total-line">
                        <span>Subtotal:</span>
                        <span id="cart-total">R$ 0,00</span>
                    </div>
                    <div class="total-line">
                        <span>Taxa de entrega:</span>
                        <span>R$ 5,00</span>
                    </div>
                    <div class="total-line grand-total">
                        <span>Total:</span>
                        <span id="grand-total">R$ 5,00</span>
                    </div>
                </div>
            </div>

            <!-- ENDEREÇO -->
            <div class="section">
                <h2>📍 Endereço de Entrega</h2>
                <div class="form-group">
                    <label for="delivery_address">Endereço Completo *</label>
                    <textarea
                        id="delivery_address"
                        rows="3"
                        placeholder="Rua, número, complemento, bairro, cidade"
                        required
                    ></textarea>
                </div>
            </div>

            <!-- PAGAMENTO -->
            <div class="section">
                <h2>💳 Forma de Pagamento</h2>
                <div class="payment-methods">
                    <div class="payment-option">
                        <input type="radio" id="pix" name="payment_method" value="pix" checked>
                        <label for="pix">💚 PIX</label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="credit_card" name="payment_method" value="credit_card">
                        <label for="credit_card">💳 Crédito</label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="cash" name="payment_method" value="cash">
                        <label for="cash">💵 Dinheiro</label>
                    </div>
                </div>

                <!-- Campos do cartão (aparecem se selecionar cartão) -->
                <div id="card-fields">
                    <div class="form-group">
                        <label>Nome no Cartão</label>
                        <input type="text" id="card_holder_name" placeholder="NOME COMPLETO">
                    </div>
                    <div class="form-group">
                        <label>Número do Cartão</label>
                        <input type="text" id="card_number" placeholder="0000 0000 0000 0000" maxlength="19">
                    </div>
                    <div class="card-row">
                        <div class="form-group">
                            <label>Mês</label>
                            <input type="text" id="card_month" placeholder="MM" maxlength="2">
                        </div>
                        <div class="form-group">
                            <label>Ano</label>
                            <input type="text" id="card_year" placeholder="AA" maxlength="2">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" id="card_cvv" placeholder="123" maxlength="3">
                        </div>
                    </div>
                </div>
            </div>

            <!-- CASHBACK -->
            <div class="section">
                <h2>💰 Usar Cashback</h2>
                <div class="form-group">
                    <label for="use_cashback">Valor disponível: R$ 0,00</label>
                    <input type="number" id="use_cashback" placeholder="0.00" min="0" step="0.01" value="0">
                </div>
            </div>

            <!-- OBSERVAÇÕES -->
            <div class="section">
                <h2>📝 Observações</h2>
                <div class="form-group">
                    <textarea
                        id="order_notes"
                        rows="2"
                        placeholder="Ex: Sem cebola, caprichar no molho..."
                    ></textarea>
                </div>
            </div>

            <!-- BOTÃO FINALIZAR -->
            <div class="section">
                <button id="btn-finalizar-pedido">
                    🛒 Finalizar Pedido
                </button>
            </div>
        </div>
    </div>

    <!-- INCLUIR O SCRIPT DE CHECKOUT -->
    <script src="/js/checkout.js"></script>

    <script>
        // Mostrar/ocultar campos do cartão
        document.querySelectorAll('input[name="payment_method"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const cardFields = document.getElementById('card-fields');
                cardFields.style.display = this.value === 'credit_card' || this.value === 'debit_card' ? 'block' : 'none';
            });
        });

        // Atualizar total ao mudar cashback
        document.getElementById('use_cashback')?.addEventListener('input', function() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const subtotal = cart.reduce((sum, item) => sum + ((item.price || 0) * (item.quantity || 1)), 0);
            const deliveryFee = 5.00;
            const cashback = parseFloat(this.value) || 0;
            const total = subtotal + deliveryFee - cashback;

            document.getElementById('grand-total').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        });
    </script>
</body>
</html>
