<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f3f4f6"/>
  <g transform="translate(100, 100)">
    <!-- Store icon -->
    <path d="M -40,-40 L 40,-40 L 50,-20 L 50,40 L -50,40 L -50,-20 Z" fill="#9ca3af" stroke="#6b7280" stroke-width="2"/>
    <rect x="-30" y="-10" width="60" height="35" fill="#d1d5db"/>
    <rect x="-40" y="-40" width="80" height="8" fill="#6b7280"/>
    <!-- Restaurant symbol -->
    <circle cx="0" cy="5" r="12" fill="#ea1d2c"/>
    <path d="M -3,2 L -3,12 M 0,-2 L 0,12 M 3,2 L 3,12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="100" y="180" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="14">Sem Logo</text>
</svg>
